name: Web

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/core/**"
      - "apps/editor/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"
      - ".github/workflows/web-ci.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/core/**"
      - "apps/editor/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"
      - ".github/workflows/web-ci.yaml"

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm --filter web format

      - name: Lint
        run: pnpm --filter web lint

      - name: Typecheck
        run: pnpm --filter web typecheck
